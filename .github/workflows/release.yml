name: Release

# Construit l'installeur Windows et le publie sur GitHub Releases.
# Déclenché en poussant un tag « vX.Y.Z » (qui DOIT correspondre à la version de
# package.json). En exécution manuelle, l'installeur est seulement archivé comme
# artefact (pas de publication).
#
# Ce workflow est aussi le socle de la signature de code (SignPath Foundation,
# gratuit pour l'open-source) : SignPath ne signe que des artefacts produits par
# une CI vérifiée. L'étape de signature est préparée plus bas (voir TODO) ; elle
# s'activera une fois le projet approuvé par SignPath.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write # nécessaire pour créer la Release et y téléverser les fichiers

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build (renderer + main + preload)
        run: npm run build

      # Produit l'installeur NSIS + latest.yml + .blockmap dans dist/.
      # --publish always : crée/maj la Release GitHub (brouillon) uniquement sur un tag.
      - name: Package & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}

      # Archive l'installeur comme artefact de workflow. Utile pour les exécutions
      # manuelles, et c'est précisément ce que consomme SignPath pour la signature.
      - name: Upload installer artifact
        id: unsigned-installer
        uses: actions/upload-artifact@v4
        with:
          name: gvue-windows-installer
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
          if-no-files-found: error

